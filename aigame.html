<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Pong Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            flex-direction: column;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #000;
        }
        h1 { margin-bottom: 10px; }
        .instructions { margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>

    <h1>PONG</h1>
    <canvas id="pongCanvas" width="800" height="400"></canvas>
    <div class="instructions">Use <b>W</b> and <b>S</b> keys to move. First to 5 wins!</div>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");

        // Game settings
        const winScore = 5;
        let gameOver = false;

        // Ball object
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            speed: 5,
            velocityX: 5,
            velocityY: 5,
            color: "WHITE"
        };

        // User Paddle
        const user = {
            x: 0,
            y: canvas.height / 2 - 50,
            width: 10,
            height: 100,
            score: 0,
            color: "WHITE"
        };

        // Computer Paddle
        const com = {
            x: canvas.width - 10,
            y: canvas.height / 2 - 50,
            width: 10,
            height: 100,
            score: 0,
            color: "WHITE"
        };

        // Key states
        let upPressed = false;
        let downPressed = false;

        window.addEventListener("keydown", (e) => {
            if (e.key === "w" || e.key === "W") upPressed = true;
            if (e.key === "s" || e.key === "S") downPressed = true;
        });

        window.addEventListener("keyup", (e) => {
            if (e.key === "w" || e.key === "W") upPressed = false;
            if (e.key === "s" || e.key === "S") downPressed = false;
        });

        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawCircle(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2, false);
            ctx.closePath();
            ctx.fill();
        }

        function drawText(text, x, y, color) {
            ctx.fillStyle = color;
            ctx.font = "45px Arial";
            ctx.fillText(text, x, y);
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = -ball.velocityX;
            ball.speed = 5;
        }

        function collision(b, p) {
            p.top = p.y;
            p.bottom = p.y + p.height;
            p.left = p.x;
            p.right = p.x + p.width;

            b.top = b.y - b.radius;
            b.bottom = b.y + b.radius;
            b.left = b.x - b.radius;
            b.right = b.x + b.radius;

            return p.left < b.right && p.top < b.bottom && p.right > b.left && p.bottom > b.top;
        }

        function update() {
            if (gameOver) return;

            // Move user paddle
            if (upPressed && user.y > 0) user.y -= 8;
            if (downPressed && user.y < canvas.height - user.height) user.y += 8;

            // Simple AI for computer
            com.y += (ball.y - (com.y + com.height / 2)) * 0.08;

            // Ball movement
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Wall collision (top/bottom)
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.velocityY = -ball.velocityY;
            }

            // Determine which paddle is being hit
            let player = (ball.x < canvas.width / 2) ? user : com;

            if (collision(ball, player)) {
                // Where the ball hits the paddle
                let collidePoint = (ball.y - (player.y + player.height / 2));
                collidePoint = collidePoint / (player.height / 2);

                // Calculate angle
                let angleRad = (Math.PI / 4) * collidePoint;

                // Direction
                let direction = (ball.x < canvas.width / 2) ? 1 : -1;
                ball.velocityX = direction * ball.speed * Math.cos(angleRad);
                ball.velocityY = ball.speed * Math.sin(angleRad);

                // Speed up ball
                ball.speed += 0.5;
            }

            // Update score
            if (ball.x - ball.radius < 0) {
                com.score++;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                user.score++;
                resetBall();
            }

            // Check for Winner
            if (user.score === winScore || com.score === winScore) {
                gameOver = true;
            }
        }

        function render() {
            // Clear canvas
            drawRect(0, 0, canvas.width, canvas.height, "#000");

            // Draw scores
            drawText(user.score, canvas.width / 4, canvas.height / 5, "WHITE");
            drawText(com.score, 3 * canvas.width / 4, canvas.height / 5, "WHITE");

            // Draw net
            for (let i = 0; i <= canvas.height; i += 15) {
                drawRect(canvas.width / 2 - 1, i, 2, 10, "WHITE");
            }

            // Draw paddles
            drawRect(user.x, user.y, user.width, user.height, user.color);
            drawRect(com.x, com.y, com.width, com.height, com.color);

            // Draw ball
            drawCircle(ball.x, ball.y, ball.radius, ball.color);

            // Draw Game Over message
            if (gameOver) {
                ctx.fillStyle = "WHITE";
                ctx.font = "60px Arial";
                let msg = user.score === winScore ? "YOU WIN!" : "COMPUTER WINS!";
                ctx.fillText(msg, canvas.width / 2 - 200, canvas.height / 2);
            }
        }
function update() {
    if (gameOver) return;

    // Move Paddles
    if (upPressed && user.y > 0) user.y -= 8;
    if (downPressed && user.y < canvas.height - user.height) user.y += 8;
    
    // Smooth AI
    let targetY = ball.y - (com.height / 2);
    com.y += (targetY - com.y) * 0.1;

    // Move Ball
    ball.x += ball.velocityX;
    ball.y += ball.velocityY;

    // --- FIX: CEILING/FLOOR STICKING ---
    // If ball goes above top or below bottom, snap it to the edge and flip velocity
    if (ball.y - ball.radius <= 0) {
        ball.y = ball.radius; 
        ball.velocityY *= -1;
    } else if (ball.y + ball.radius >= canvas.height) {
        ball.y = canvas.height - ball.radius;
        ball.velocityY *= -1;
    }

    // --- FIX: PADDLE STICKING & GHOST POINTS ---
    // We only check for collision if the ball is moving TOWARD the paddle's side
    if (ball.velocityX < 0) { // Moving toward User (Left)
        if (ball.x - ball.radius <= user.x + user.width && 
            ball.y > user.y && ball.y < user.y + user.height) {
            
            // Snap to front of paddle to prevent "sinking"
            ball.x = user.x + user.width + ball.radius;
            
            // Calculate bounce angle
            let collidePoint = (ball.y - (user.y + user.height / 2)) / (user.height / 2);
            let angleRad = (Math.PI / 4) * collidePoint;
            
            ball.speed += 0.5;
            ball.velocityX = ball.speed * Math.cos(angleRad);
            ball.velocityY = ball.speed * Math.sin(angleRad);
        }
    } else { // Moving toward Computer (Right)
        if (ball.x + ball.radius >= com.x && 
            ball.y > com.y && ball.y < com.y + com.height) {
            
            // Snap to front of paddle
            ball.x = com.x - ball.radius;
            
            // Calculate bounce angle
            let collidePoint = (ball.y - (com.y + com.height / 2)) / (com.height / 2);
            let angleRad = (Math.PI / 4) * collidePoint;
            
            ball.speed += 0.5;
            ball.velocityX = -ball.speed * Math.cos(angleRad);
            ball.velocityY = ball.speed * Math.sin(angleRad);
        }
    }

    // --- SCORING ---
    if (ball.x < 0) {
        com.score++;
        checkWin();
    } else if (ball.x > canvas.width) {
        user.score++;
        checkWin();
    }
}

function checkWin() {
    if (user.score >= 5 || com.score >= 5) {
        gameOver = true;
    } else {
        resetBall();
    }
}
        function game() {
            update();
            render();
        }

        const framePerSecond = 50;
        setInterval(game, 1000 / framePerSecond);
    </script>
</body>
</html>
